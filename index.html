<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>販賣機採購比價系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--surface:#161a24;--surface2:#1e2435;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf2;--text2:#8890a8;--text3:#4a5168;
  --accent:#4ade80;--accent-dim:rgba(74,222,128,0.12);--accent-border:rgba(74,222,128,0.3);
  --danger:#f87171;--danger-dim:rgba(248,113,113,0.12);--danger-border:rgba(248,113,113,0.3);
  --warn:#fbbf24;--warn-dim:rgba(251,191,36,0.12);--warn-border:rgba(251,191,36,0.3);
  --info:#60a5fa;--info-dim:rgba(96,165,250,0.1);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);
  --radius:8px;--radius-lg:12px;
  --mono:'DM Mono',monospace;--sans:'Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
.app{min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:fixed;top:0;left:0;right:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px}
.header-right{display:flex;gap:8px;align-items:center}
.main{grid-template-columns:220px 1fr;overflow:hidden}

/* Sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;min-height:0}
.sb-section{padding:12px 13px;border-bottom:1px solid var(--border)}
.sb-label{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.cat-btn{display:block;width:100%;text-align:left;padding:6px 9px;border-radius:var(--radius);border:none;background:none;color:var(--text2);cursor:pointer;font-size:13px;font-family:var(--sans);transition:all .15s;margin-bottom:2px}
.cat-btn:hover{background:var(--surface2);color:var(--text)}
.cat-btn.active{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}
.cat-count{float:right;font-size:11px;font-family:var(--mono);background:var(--surface2);padding:1px 6px;border-radius:10px;color:var(--text3)}
.cat-btn.active .cat-count{background:rgba(74,222,128,.2);color:var(--accent)}
.chip{display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius);padding:6px 9px;margin-bottom:5px;border:1px solid var(--border2)}
.chip.store-chip{background:var(--surface2)}
.chip.mfr-chip{background:rgba(167,139,250,0.07);border-color:rgba(167,139,250,0.2)}
.chip-left{display:flex;align-items:center;gap:7px;min-width:0}
.chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chip-info{min-width:0}
.chip-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-sub{font-size:10px;color:var(--text3)}
.chip-rm{background:none;border:none;color:var(--text3);cursor:pointer;font-size:17px;line-height:1;padding:0 2px;flex-shrink:0}
.chip-rm:hover{color:var(--danger)}

/* Expiry alert panel in sidebar */
.expiry-panel{margin:0}
.exp-item{display:flex;align-items:center;justify-content:space-between;padding:6px 9px;border-radius:var(--radius);margin-bottom:4px;font-size:12px;cursor:pointer;transition:opacity .15s}
.exp-item:hover{opacity:.8}
.exp-item.expired{background:var(--danger-dim);border:1px solid var(--danger-border)}
.exp-item.urgent{background:rgba(251,191,36,0.15);border:1px solid var(--warn-border)}
.exp-item.soon{background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.15)}
.exp-name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.exp-days{font-family:var(--mono);font-size:11px;flex-shrink:0;margin-left:6px;font-weight:700}
.exp-days.expired{color:var(--danger)}.exp-days.urgent{color:var(--warn)}.exp-days.soon{color:#fde68a}
.no-exp{font-size:12px;color:var(--text3);text-align:center;padding:8px 0}

/* Content */
.content{display:flex;flex-direction:column;overflow:hidden;min-height:0;height:100%}
.content-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;flex-shrink:0}
.page-title{font-size:16px;font-weight:700}
.toolbar{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative}
.search-wrap input{padding-left:29px;width:175px}
.s-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:13px}

/* Filter bar */
.filter-bar{display:flex;gap:5px;padding:8px 20px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;align-items:center;background:var(--bg)}
.filter-label{font-size:11px;color:var(--text3);white-space:nowrap;margin-right:2px}
.fpill{padding:3px 10px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;font-size:12px;font-family:var(--sans);white-space:nowrap;transition:all .15s}
.fpill:hover{background:var(--surface2);color:var(--text)}
.fpill.active-store{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
.fpill.active-mfr{background:var(--purple-dim);border-color:rgba(167,139,250,.4);color:var(--purple)}
.fpill.active-exp{background:var(--danger-dim);border-color:var(--danger-border);color:var(--danger)}
.divider-v{width:1px;height:18px;background:var(--border2);margin:0 3px;flex-shrink:0}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-shrink:0}
.stat-card{background:var(--bg);padding:11px 14px;cursor:default}
.stat-card.clickable{cursor:pointer;transition:background .15s}
.stat-card.clickable:hover{background:var(--surface2)}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.stat-value{font-size:20px;font-weight:700;font-family:var(--mono)}
.stat-sub{font-size:10px;color:var(--text3);margin-top:1px}
.sv-green{color:var(--accent)}.sv-warn{color:var(--warn)}.sv-danger{color:var(--danger)}

/* Table */
.table-wrap{flex:1;overflow:auto;min-height:0}
table{width:100%;border-collapse:collapse;min-width:900px}
thead th{position:sticky;top:0;background:var(--surface);padding:8px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;z-index:2}
thead th.th-exp{background:#1a1520}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.025)}
tbody tr.row-expired{background:rgba(248,113,113,0.04)}
tbody tr.row-urgent{background:rgba(251,191,36,0.04)}
td{padding:9px 10px;vertical-align:middle}
.td-name{font-weight:500;font-size:13px}
.badge-cat{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;background:var(--info-dim);color:var(--info);border:1px solid rgba(96,165,250,.2)}
.badge-mfr{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 6px;border-radius:4px;background:var(--purple-dim);color:var(--purple);border:1px solid rgba(167,139,250,.25);white-space:nowrap}
.pc{font-family:var(--mono);font-size:12px;white-space:nowrap}
.pc.best{color:var(--accent)}.pc.worst{color:var(--danger)}.pc.none{color:var(--text3);font-size:11px}
.best-tag{display:inline-block;font-size:9px;padding:1px 4px;border-radius:3px;background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border);margin-left:2px;font-family:var(--sans);font-weight:700;vertical-align:middle}
.store-badge{display:inline-flex;align-items:center;gap:3px;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;font-size:11px;white-space:nowrap}
.save-main{color:var(--accent);font-size:12px;font-family:var(--mono)}
.save-sub{font-size:10px;color:var(--text3)}
.qty-low{color:var(--warn);font-family:var(--mono);font-size:12px}
.qty-ok{color:var(--text);font-family:var(--mono);font-size:12px}

/* Expiry cell */
.exp-cell{white-space:nowrap}
.exp-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;font-family:var(--mono)}
.exp-badge.expired{background:var(--danger-dim);color:var(--danger);border:1px solid var(--danger-border)}
.exp-badge.urgent{background:var(--warn-dim);color:var(--warn);border:1px solid var(--warn-border)}
.exp-badge.soon{background:rgba(251,191,36,0.07);color:#fde68a;border:1px solid rgba(253,230,138,.25)}
.exp-badge.ok{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}
.exp-badge.none{color:var(--text3);font-size:11px;background:none;border:none;padding:0;font-weight:400}
.exp-date{display:block;font-size:10px;color:var(--text3);margin-top:1px;font-family:var(--mono)}
.row-actions{display:flex;gap:3px;opacity:0;transition:opacity .1s}
tbody tr:hover .row-actions{opacity:1}
.empty-state{text-align:center;padding:50px;color:var(--text3)}

/* Add panel */
.add-panel{border-top:1px solid var(--border);background:var(--surface);padding:10px 20px;flex-shrink:0}
.add-panel-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.add-grid{display:flex;gap:7px;flex-wrap:wrap;align-items:flex-end}
.ag{display:flex;flex-direction:column;gap:3px}
.ag label{font-size:10px;color:var(--text3)}
.ag.grow{flex:1;min-width:120px}.ag.short{width:73px}.ag.mid{width:90px}.ag.date{width:115px}

/* Forms */
input,select{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:13px;padding:6px 9px;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus{border-color:rgba(74,222,128,.4)}
input::placeholder{color:var(--text3)}
select option{background:var(--surface2)}
input[type="date"]{color-scheme:dark}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#0d1a10;border-color:var(--accent)}
.btn-primary:hover{background:#6ee7a0}
.btn-ghost{background:none;color:var(--text2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:none;color:var(--danger);border-color:rgba(248,113,113,.2)}
.btn-danger:hover{background:var(--danger-dim)}
.btn-sm{padding:3px 8px;font-size:12px}.btn-icon{padding:4px 6px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:22px;width:560px;max-width:94vw;max-height:90vh;overflow-y:auto;transform:translateY(10px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:15px}
.mrow{margin-bottom:11px}
.mrow>label{display:block;font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.price-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.pgi label{display:flex;align-items:center;gap:5px;margin-bottom:4px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.type-row{display:flex;gap:7px;flex-wrap:wrap}
.type-pill{flex:1;min-width:70px;text-align:center;padding:7px 5px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--text2);background:none;font-family:var(--sans);transition:all .15s}
.type-pill:hover{border-color:var(--accent-border);color:var(--text)}
.type-pill.selected{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent);font-weight:500}
.type-pill.sel-purple{background:var(--purple-dim);border-color:rgba(167,139,250,.4);color:var(--purple);font-weight:500}
.modal-divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.sec-head{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.sec-dot{width:6px;height:6px;border-radius:50%}
.notif{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--accent-border);color:var(--accent);border-radius:var(--radius);padding:8px 13px;font-size:13px;transform:translateY(18px);opacity:0;transition:all .25s;z-index:300;display:flex;align-items:center;gap:6px}
.notif.show{transform:translateY(0);opacity:1}

/* Nav tabs */
.header-nav{display:flex;gap:4px;align-items:center}
.nav-tab{padding:6px 16px;border-radius:var(--radius);border:none;background:none;color:var(--text2);cursor:pointer;font-size:13px;font-family:var(--sans);font-weight:500;transition:all .15s}
.nav-tab:hover{background:var(--surface2);color:var(--text)}
.nav-tab.active{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}

/* Sales table */
#page-sales table thead th{position:sticky;top:0;background:var(--surface);padding:9px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
#page-sales table tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
#page-sales table tbody tr:hover{background:rgba(255,255,255,.02)}
#page-sales table td{padding:9px 12px;vertical-align:middle;font-size:13px}
.profit-pos{color:var(--accent);font-family:var(--mono);font-weight:500}
.profit-neg{color:var(--danger);font-family:var(--mono);font-weight:500}
.profit-zero{color:var(--text3);font-family:var(--mono)}

/* Page switch */
.page-hidden{display:none !important}
#page-sales{height:calc(100vh - 56px);flex-direction:column;overflow:hidden}
#page-inventory{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 56px);overflow:hidden}
#page-inventory.page-hidden{display:none !important}

/* ── 已有的 pulse-danger ── */
@keyframes pulse-danger{0%,100%{background:rgba(248,113,113,0.04)}50%{background:rgba(248,113,113,0.09)}}
tbody tr.row-expired{animation:pulse-danger 2.5s infinite}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">
    <div class="logo-icon">🥤</div>
    <span>販賣機採購比價系統</span>
  </div>
  <nav class="header-nav">
    <button class="nav-tab active" id="nav-inventory" onclick="switchPage('inventory')">📦 採購比價</button>
    <button class="nav-tab" id="nav-sales" onclick="switchPage('sales')">📊 販售資料</button>
  </nav>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="syncStatus" style="font-size:11px;color:var(--text3)">連線中…</span>
  <div class="header-right" id="header-actions-inventory">
    <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ 匯出 CSV</button>
    <button class="btn btn-primary btn-sm" onclick="openAddItemModal()">＋ 新增飲料</button>
  </div>
  <div class="header-right" id="header-actions-sales" style="display:none">
    <button class="btn btn-ghost btn-sm" onclick="exportSalesCSV()">⬇ 匯出 CSV</button>
    <button class="btn btn-primary btn-sm" onclick="openAddSaleModal()">＋ 新增銷售記錄</button>
  </div>
  </div><!-- end sync wrapper -->
</header>

<div style="position:fixed;top:56px;left:0;right:0;bottom:0;overflow:hidden">
<div class="main" id="page-inventory" style="display:grid;grid-template-columns:220px 1fr;height:100%;overflow:hidden">
  <aside class="sidebar">
    <!-- 類別 -->
    <div class="sb-section">
      <div class="sb-label">飲料類別</div>
      <div id="catList"></div>
    </div>
    <!-- 過期警示 -->
    <div class="sb-section">
      <div class="sb-label" style="color:var(--danger)">⚠ 效期警示</div>
      <div id="expiryPanel"></div>
    </div>
    <!-- 採購通路 -->
    <div class="sb-section">
      <div class="sb-label"><span>採購通路</span>
        <button class="btn btn-ghost btn-sm btn-icon" onclick="openAddStoreModal()" style="padding:1px 5px">＋</button>
      </div>
      <div id="storeList"></div>
    </div>
    <!-- 飲料廠商 -->
    <div class="sb-section" style="flex:1">
      <div class="sb-label"><span>飲料廠商</span>
        <button class="btn btn-ghost btn-sm btn-icon" onclick="openAddMfrModal()" style="padding:1px 5px">＋</button>
      </div>
      <div id="mfrList"></div>
    </div>
  </aside>

  <div class="content">
    <div class="content-header">
      <div class="page-title" id="pageTitle">全部飲料</div>
      <div class="toolbar">
        <div class="search-wrap">
          <span class="s-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="搜尋飲料…" oninput="render()">
        </div>
        <select id="sortSel" onchange="render()" style="width:auto">
          <option value="slot_asc">倉道排序</option>
          <option value="name">名稱排序</option>
          <option value="exp_asc">效期最近</option>
          <option value="best_asc">最低價 ↑</option>
          <option value="best_desc">最低價 ↓</option>
          <option value="save_desc">差價最大</option>
          <option value="qty_asc">庫存 ↑</option>
          <option value="qty_desc">庫存 ↓</option>
        </select>
      </div>
    </div>

    <div class="filter-bar" id="filterBar"></div>
    <div class="stats-row" id="statsRow"></div>

    <div class="table-wrap">
      <table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
      <div class="empty-state" id="emptyState" style="display:none">
        <div style="font-size:34px;margin-bottom:8px">📭</div><div>沒有符合的品項</div>
      </div>
    </div>

    <div class="add-panel">
      <div class="add-panel-label">快速新增飲料</div>
      <div class="add-grid" id="quickAddRow"></div>
    </div>
  </div>
</div>
</div>

<!-- ══ 販售資料頁面 ══ -->
<div id="page-sales" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;flex-direction:column;overflow:hidden;background:var(--bg)"></div>
</div><!-- end page-container -->

<!-- 新增銷售 Modal -->
<div class="modal-overlay" id="saleModal" onclick="if(event.target===this)closeModal('saleModal')">
  <div class="modal">
    <div class="modal-title" id="saleModalTitle">新增銷售記錄</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px">
      <div><label style="display:block;font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em">販售日期</label>
        <input id="sl_date" type="date"></div>
      <div><label style="display:block;font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em">倉道號碼</label>
        <select id="sl_slot"></select></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px">
      <div><label style="display:block;font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em">飲料品項</label>
        <select id="sl_item"></select></div>
      <div><label style="display:block;font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em">販售數量</label>
        <input id="sl_qty" type="number" min="1" placeholder="1"></div>
    </div>

function bp(item){const v=vp(item);return v.length?Math.min(...v):null;}
function wp(item){const v=vp(item);return v.length?Math.max(...v):null;}
function bstores(item){const b=bp(item);return b==null?[]:stores.filter(s=>item.prices[s.name]===b).map(s=>s.name);}
function saving(item){const b=bp(item),w=wp(item);return(b!=null&&w!=null&&b!==w)?w-b:0;}

function expiryStatus(item){
  const days=daysUntil(item.expiry);
  if(days===null) return {cls:'none',label:'未設定',days:null};
  const warn=item.warnDays||30;
  if(days<0)  return {cls:'expired',label:'已過期',days};
  if(days===0) return {cls:'expired',label:'今天到期',days};
  if(days<=7)  return {cls:'urgent',label:`剩 ${days} 天`,days};
  if(days<=warn) return {cls:'soon',label:`剩 ${days} 天`,days};
  return {cls:'ok',label:`剩 ${days} 天`,days};
}

function isExpiring(item){
  const s=expiryStatus(item);
  return s.cls==='expired'||s.cls==='urgent'||s.cls==='soon';
}

function filtered(){
  const q=(document.getElementById('searchInput')?.value||'').trim().toLowerCase();
  let d=items.filter(i=>currentCat==='全部'||i.cat===currentCat);
  if(q) d=d.filter(i=>i.name.toLowerCase().includes(q));
  if(filterStore) d=d.filter(i=>i.prices[filterStore]!=null);
  if(filterMfr) d=d.filter(i=>i.mfr===filterMfr);
  if(filterExpOnly) d=d.filter(i=>isExpiring(i));
  const s=document.getElementById('sortSel')?.value||'slot_asc';
  return d.sort((a,b)=>{
    if(s==='slot_asc') return (parseInt(a.slot)||0)-(parseInt(b.slot)||0);
    if(s==='name') return a.name.localeCompare(b.name,'zh-Hant');
    if(s==='exp_asc'){
      const da=daysUntil(a.expiry)??9999,db=daysUntil(b.expiry)??9999;
      return da-db;
    }
    if(s==='best_asc') return(bp(a)??999)-(bp(b)??999);
    if(s==='best_desc') return(bp(b)??0)-(bp(a)??0);
    if(s==='save_desc') return saving(b)-saving(a);
    if(s==='qty_asc') return a.qty-b.qty;
    if(s==='qty_desc') return b.qty-a.qty;
    return 0;
  });
}

    .map(i=>({item:i,st:expiryStatus(i)}))

      </div>

function renderStats(){
  const d=filtered();
  const totalSave=d.reduce((s,i)=>s+saving(i)*i.qty,0);
  const missing=d.filter(i=>stores.some(s=>i.prices[s.name]==null)).length;
  const low=d.filter(i=>i.qty<=5&&i.qty>0).length;
  const expired=items.filter(i=>{const s=expiryStatus(i);return s.cls==='expired';}).length;
  const expiring=items.filter(i=>isExpiring(i)).length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="stat-label">飲料品項</div><div class="stat-value">${d.length}</div></div>
    <div class="stat-card"><div class="stat-label">缺查價品項</div><div class="stat-value ${missing>0?'sv-warn':''}">${missing}</div><div class="stat-sub">有通路未填報價</div></div>
    <div class="stat-card"><div class="stat-label">庫存偏低</div><div class="stat-value ${low>0?'sv-danger':''}">${low}</div><div class="stat-sub">≤5件需補貨</div></div>
    <div class="stat-card clickable" onclick="toggleF('exp','')" title="點擊篩選快過期品項">
      <div class="stat-label">⚠ 效期警示</div>
      <div class="stat-value ${expiring>0?'sv-warn':''}">${expiring}</div>
      <div class="stat-sub">${expired>0?`含 ${expired} 件已過期`:'點擊篩選'}</div>
    </div>
    <div class="stat-card"><div class="stat-label">最低價採購可省</div><div class="stat-value sv-green">$${totalSave.toLocaleString()}</div><div class="stat-sub">依現有庫存計算</div></div>
  `;
}

function render(){renderSidebar();renderFilterBar();renderStats();renderTable();}

function key(n){return n.replace(/[\s\/\(\)]/g,'_');}
function setCat(c){currentCat=c;render();}
function toggleF(type,val){
  if(type==='store')filterStore=filterStore===val?'':val;
  else if(type==='mfr')filterMfr=filterMfr===val?'':val;
  else if(type==='exp')filterExpOnly=!filterExpOnly;
  render();
}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function highlightItem(id){
  filterExpOnly=false;currentCat='全部';filterStore='';filterMfr='';
  render();
  setTimeout(()=>{
    const row=document.getElementById('item-row-'+id);
    if(row){row.scrollIntoView({behavior:'smooth',block:'center'});
      row.style.outline='2px solid var(--warn)';
      setTimeout(()=>row.style.outline='',2000);}
  },100);
}

// Store modal
function selType(el,kind){
  const sel=kind==='mfr'?'sel-purple':'selected';
  el.closest('.type-row').querySelectorAll('.type-pill').forEach(p=>{p.classList.remove('selected','sel-purple');});
  el.classList.add(sel);
}
function openAddStoreModal(){
  document.getElementById('sm_name').value='';
  document.querySelectorAll('#storeModal .type-pill').forEach((p,i)=>{p.classList.remove('selected','sel-purple');if(i===0)p.classList.add('selected');});
  document.getElementById('storeModal').classList.add('open');
  setTimeout(()=>document.getElementById('sm_name').focus(),100);
}
function confirmAddStore(){
  const name=document.getElementById('sm_name').value.trim();
  if(!name||stores.find(s=>s.name===name))return;
  const type=document.querySelector('#storeModal .type-pill.selected')?.dataset.t||'其他';
  stores.push({name,type});
  items.forEach(i=>{if(i.prices[name]===undefined)i.prices[name]=null;});
  closeModal('storeModal');renderQuickAdd();render();
  notify(`已新增採購通路：${name}`);
}
function removeStore(name){
  if(stores.length<=1){notify('至少需要一個採購通路');return;}
  if(filterStore===name)filterStore='';
  stores=stores.filter(s=>s.name!==name);
  renderQuickAdd();render();notify(`已移除通路：${name}`);
}

// Mfr modal
function openAddMfrModal(){
  document.getElementById('mm_name').value='';
  document.querySelectorAll('#mfrModal .type-pill').forEach((p,i)=>{p.classList.remove('selected','sel-purple');if(i===0)p.classList.add('sel-purple');});
  document.getElementById('mfrModal').classList.add('open');
  setTimeout(()=>document.getElementById('mm_name').focus(),100);
}
function confirmAddMfr(){
  const name=document.getElementById('mm_name').value.trim();
  if(!name||manufacturers.find(m=>m.name===name))return;
  const type=document.querySelector('#mfrModal .type-pill.sel-purple')?.dataset.t||'其他';
  manufacturers.push({name,type});
  closeModal('mfrModal');renderQuickAdd();render();
  notify(`已新增飲料廠商：${name}`);
}
function removeMfr(name){
  if(filterMfr===name)filterMfr='';
  manufacturers=manufacturers.filter(m=>m.name!==name);
  items.forEach(i=>{if(i.mfr===name)i.mfr='';});
  renderQuickAdd();render();notify(`已移除廠商：${name}`);
}

// Item modal
function buildPriceGrid(getVal){
  document.getElementById('itemPriceGrid').innerHTML=stores.map((s,i)=>`
    <div class="pgi">
      <label><span style="width:7px;height:7px;border-radius:50%;background:${sc(i)};display:inline-block"></span>${STORE_ICONS[s.type]||'🏷'} ${s.name}</label>
      <input id="im_p_${key(s.name)}" type="number" min="0" placeholder="未查價" value="${getVal?getVal(s.name):''}">
    </div>`).join('');
}
function getPrices(){
  const p={};
  stores.forEach(s=>{const el=document.getElementById('im_p_'+key(s.name));const v=el?parseFloat(el.value):NaN;p[s.name]=(!isNaN(v)&&v>0)?v:null;});
  return p;
}
function refreshMfrSelect(selVal){
  document.getElementById('im_mfr').innerHTML=`<option value="">（未指定）</option>`+manufacturers.map(m=>`<option ${m.name===selVal?'selected':''}>${m.name}</option>`).join('');
}
function openAddItemModal(){
  document.getElementById('itemModalTitle').textContent='新增飲料品項';
  document.getElementById('itemConfirmBtn').textContent='新增品項';
  document.getElementById('im_name').value='';
  document.getElementById('im_qty').value='';
  document.getElementById('im_slot').value='';
  document.getElementById('im_restock').value=todayStr();
  document.getElementById('im_expiry').value='';
  document.getElementById('im_warn').value='30';
  refreshMfrSelect('');
  buildPriceGrid(null);
  document.getElementById('itemConfirmBtn').onclick=confirmAddItem;
  document.getElementById('itemModal').classList.add('open');
  setTimeout(()=>document.getElementById('im_name').focus(),100);
}
function confirmAddItem(){
  const name=document.getElementById('im_name').value.trim();
  if(!name){document.getElementById('im_name').focus();return;}
  items.push({id:nextId++,name,
    cat:document.getElementById('im_cat').value,
    mfr:document.getElementById('im_mfr').value,
    slot:document.getElementById('im_slot').value,
    qty:parseInt(document.getElementById('im_qty').value)||0,
    restock:document.getElementById('im_restock').value||'',
    expiry:document.getElementById('im_expiry').value||'',
    warnDays:parseInt(document.getElementById('im_warn').value)||30,
    prices:getPrices()
  });
  closeModal('itemModal');renderQuickAdd();render();notify(`已新增：${name}`);
}
function openEditModal(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  document.getElementById('itemModalTitle').textContent='編輯飲料品項';
  document.getElementById('im_name').value=item.name;
  document.getElementById('im_cat').value=item.cat;
  document.getElementById('im_qty').value=item.qty;
  document.getElementById('im_restock').value=item.restock||'';
  document.getElementById('im_expiry').value=item.expiry||'';
  document.getElementById('im_warn').value=item.warnDays||30;
  document.getElementById('im_slot').value=item.slot||'';
  refreshMfrSelect(item.mfr);
  buildPriceGrid(n=>item.prices[n]??'');
  document.getElementById('itemConfirmBtn').textContent='儲存';
  document.getElementById('itemConfirmBtn').onclick=()=>{
    item.name=document.getElementById('im_name').value.trim()||item.name;
    item.cat=document.getElementById('im_cat').value;
    item.mfr=document.getElementById('im_mfr').value;
    item.slot=document.getElementById('im_slot').value;
    item.qty=parseInt(document.getElementById('im_qty').value)||0;
    item.restock=document.getElementById('im_restock').value||'';
    item.expiry=document.getElementById('im_expiry').value||'';
    item.warnDays=parseInt(document.getElementById('im_warn').value)||30;
    Object.assign(item.prices,getPrices());
    closeModal('itemModal');render();notify('已更新');fbSaveAll();showSyncStatus('☁ 儲存中…','var(--warn)');setTimeout(()=>showSyncStatus('☁ 已同步','var(--text3)'),1200);
  };
  document.getElementById('itemModal').classList.add('open');
}
function removeItem(id){const item=items.find(i=>i.id===id);items=items.filter(i=>i.id!==id);render();notify(`已刪除：${item?.name}`);}

function quickAdd(){
  const name=document.getElementById('qa_name').value.trim();
  if(!name){document.getElementById('qa_name').focus();return;}
  const prices={};
  stores.forEach(s=>{const el=document.getElementById('qa_'+key(s.name));const v=el?parseFloat(el.value):NaN;prices[s.name]=(!isNaN(v)&&v>0)?v:null;});
  items.push({id:nextId++,name,
    cat:document.getElementById('qa_cat').value,
    mfr:document.getElementById('qa_mfr').value,
    slot:document.getElementById('qa_slot').value,
    qty:parseInt(document.getElementById('qa_qty').value)||0,
    restock:document.getElementById('qa_restock').value||'',
    expiry:document.getElementById('qa_expiry').value||'',
    warnDays:30,
    prices
  });
  renderQuickAdd();render();notify(`已新增：${name}`);
}

function exportCSV(){
  const d=filtered(),snames=stores.map(s=>s.name);
  const rows=[['飲料名稱','類別','飲料廠商','倉道號碼','庫存','進貨日期','商品效期','剩餘天數','效期狀態',...snames,'最低價','建議採購通路','每件差價','依庫存可省']];
  d.forEach(item=>{
    const b=bp(item),sv=saving(item),bs=bstores(item),est=expiryStatus(item);
    rows.push([item.name,item.cat,item.mfr||'',item.slot||'',item.qty,
      item.restock||'',item.expiry||'',est.days??'',est.label,
      ...snames.map(n=>item.prices[n]??''),
      b??'',bs.join('/'),sv>0?sv:'',sv>0?sv*item.qty:'']);
  });
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');

function buildSaleModalOpts(){

}

function salesFiltered(){
  const slot=document.getElementById('salesSlotFilter')?.value||'';
  const from=document.getElementById('salesDateFrom')?.value||'';
  const to=document.getElementById('salesDateTo')?.value||'';
  const sort=document.getElementById('salesSort')?.value||'date_desc';
  let d=[...sales];
  if(slot) d=d.filter(s=>s.slot===slot);
  if(from) d=d.filter(s=>s.date>=from);
  if(to)   d=d.filter(s=>s.date<=to);
  return d.sort((a,b)=>{
    if(sort==='date_desc') return b.date.localeCompare(a.date);
    if(sort==='date_asc')  return a.date.localeCompare(b.date);
    if(sort==='qty_desc')  return b.qty-a.qty;
    if(sort==='rev_desc')  return(b.qty*b.price)-(a.qty*a.price);
    return 0;
  });
}

function renderSalesStats(){
  const d=salesFiltered();
  const totalRev=d.reduce((s,r)=>s+r.qty*r.price,0);
  const totalCost=d.reduce((s,r)=>s+r.qty*r.cost,0);
  const totalQty=d.reduce((s,r)=>s+r.qty,0);
  const profit=totalRev-totalCost;
  const margin=totalRev>0?((profit/totalRev)*100).toFixed(1):0;
  document.getElementById('salesStatsRow').innerHTML=`
    <div class="stat-card"><div class="stat-label">銷售筆數</div><div class="stat-value">${d.length}</div></div>
    <div class="stat-card"><div class="stat-label">總銷售量</div><div class="stat-value">${totalQty}<span style="font-size:13px;color:var(--text3)"> 件</span></div></div>
    <div class="stat-card"><div class="stat-label">總營收</div><div class="stat-value sv-green">$${totalRev.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">總採購成本</div><div class="stat-value sv-warn">$${totalCost.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">毛利 / 毛利率</div>
      <div class="stat-value ${profit>=0?'sv-green':'sv-danger'}">${profit>=0?'+':''}$${profit.toLocaleString()}</div>
      <div class="stat-sub">${margin}%</div></div>
  `;
}

function confirmAddSale(){

  document.getElementById('sl_qty').value=r.qty;
  document.getElementById('sl_price').value=r.price;

    r.date=document.getElementById('sl_date').value;

    r.itemName=document.getElementById('sl_item').value;

    r.price=parseFloat(document.getElementById('sl_price').value)||0;

}
function removeSale(id){const r=sales.find(s=>s.id===id);sales=sales.filter(s=>s.id!==id);renderSales();notify(`已刪除：${r?.itemName}`);}
function quickAddSale(){

  sales.push({id:nextSaleId++,
    date:document.getElementById('qs_date').value||todayStr(),
    slot:document.getElementById('qs_slot').value,
    itemName,qty,
    price:parseFloat(document.getElementById('qs_price').value)||0,
    cost:parseFloat(document.getElementById('qs_cost').value)||0,

  });

function exportSalesCSV(){
  const d=salesFiltered();
  const rows=[['販售日期','倉道','飲料品項','數量','販售單價','採購單價','營收','成本','毛利','毛利率','備註']];
  d.forEach(r=>{
    const rev=r.qty*r.price,cost=r.qty*r.cost,profit=rev-cost;
    const margin=rev>0?((profit/rev)*100).toFixed(1)+'%':'';
    rows.push([r.date,r.slot||'',r.itemName,r.qty,r.price,r.cost,rev,cost,profit,margin,r.note||'']);
  });
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='販售資料.csv';a.click();notify('CSV 已匯出');
}

// 自動儲存：攔截所有會改變資料的函式
const _origNotify = notify;
function autoSave(fn){
  return function(...args){
    const r = fn.apply(this,args);
    fbSaveAll();
    showSyncStatus('☁ 儲存中…','var(--warn)');
    setTimeout(()=>showSyncStatus('☁ 已同步','var(--text3)'),1200);
    return r;
  };
}
